STAFF_MODE:
  ACTION_BAR_STRING: '&eVanish: %vanished% &7| &eHide Staff: %hidestaff%'
  FREEZE_MESSAGE_INTERVAL: 3
  RANDOM_TP_MINER_Y: 25 # For random tp miner player has to be below this y level
  DISABLED_COMMANDS_FROZEN:
    - 'f home'
    - 't home'
    - 'faction home'
    - 'team home'
    - 'logout'
  STAFF_ITEMS:
    VANISH_ON:
      NAME: '&bVanish &c(Disabled)'
      ACTION: 'VANISH_ON' # Can be: VANISH_OFF, VANISH_ON, INSPECTION, FREEZE, INTERACT_PLAYER
      MATERIAL: 'INK_SACK'
      DATA: 8
      SLOT: 1
      REPLACE: 'VANISH_OFF' # When clicked, which item should replace this one.
      COMMAND: ''
      LORE:
        - '&fClick to appear to all online players. '
    VANISH_OFF:
      NAME: '&bVanish &a(Enabled)'
      ACTION: 'VANISH_OFF' # Can be: VANISH_OFF, VANISH_ON, INSPECTION, FREEZE, INTERACT_PLAYER
      MATERIAL: 'INK_SACK'
      DATA: 10
      SLOT: 1
      REPLACE: 'VANISH_ON' # When clicked, which item should replace this one.
      COMMAND: ''
      LORE:
        - '&7Click to vanish from all online players.'
    FREEZE:
      NAME: '&bFreeze'
      ACTION: 'FREEZE' # Can be: VANISH_OFF, VANISH_ON, INSPECTION, FREEZE, INTERACT_PLAYER
      MATERIAL: 'ICE'
      DATA: 0
      SLOT: 2
      REPLACE: '' # When clicked, which item should replace this one.
      COMMAND: ''
      LORE:
        - '&7Click a player to freeze them.'
    RANDOM_TP:
      NAME: '&bRandom Teleport'
      ACTION: '' # Can be: VANISH_OFF, VANISH_ON, INSPECTION, FREEZE, INTERACT_PLAYER
      MATERIAL: 'WATCH'
      DATA: 0
      SLOT: 8
      REPLACE: '' # When clicked, which item should replace this one.
      COMMAND: '/randomtp'
      LORE:
        - '&7Click to randomly teleport to a online player..'
    INSPECTION:
      NAME: '&bInventory Inspect'
      ACTION: 'INSPECTION' # Can be: VANISH_OFF, VANISH_ON, INSPECTION, FREEZE, INTERACT_PLAYER
      MATERIAL: 'BOOK'
      DATA: 0
      SLOT: 9
      REPLACE: '' # When clicked, which item should replace this one.
      COMMAND: ''
      LORE:
        - '&7Click a player to inspect their inventory.'
    COMPASS:
      NAME: '&bWall Teleport'
      ACTION: '' # Can be: VANISH_OFF, VANISH_ON, INSPECTION, FREEZE, INTERACT_PLAYER
      MATERIAL: 'COMPASS'
      DATA: 0
      SLOT: 5
      REPLACE: '' # When clicked, which item should replace this one.
      COMMAND: ''
      LORE:
        - '&7Click a wall to teleport through it.'
  INSPECTION_MENU:
    TITLE: '&dInspection Menu'
    SIZE: 54
    FILLER:
      NAME: '&7'
      MATERIAL: STAINED_GLASS_PANE
      DATA: 3
    POTIONS_VIEWER:
      NAME: '&dActive Effects'
      MATERIAL: BREWING_STAND_ITEM
      DATA: 0
      SLOT: 50
      FORMAT: '&e%effect% &7(&d%time% &dLVL: %amplifier%&7)'
    PLAYER_INFO:
      NAME: '&ePlayer Info&7: &d%player%'
      MATERIAL: 'SKULL_ITEM'
      DATA: 0
      SLOT: 51
      LORE:
        - '&dKills&7: &f%kills%'
        - '&dDeaths&7: &f%deaths%'
        - '&dLives&7: &f%lives%'
    CLOSE_INSPECTION:
      NAME: '&cClose Inspection'
      MATERIAL: 'WOOL'
      DATA: 14
      SLOT: 54
      LORE:
        - '&eClick to close inspection.'
    HELMET_SLOT: 46
    CHESTPLATE_SLOT: 47
    LEGGINGS_SLOT: 48
    BOOTS_SLOT: 49
  STAFF_ONLINE_MENU:
    TITLE: '&dOnline Staff'
    SIZE: 27
    STAFF_HEAD:
      NAME: '%rank-prefix%%color%%player%'
      MATERIAL: 'SKULL_ITEM'
      DATA: 3
      COMMAND: '/tp %player%'
      LORE:
        - ''
        - '&eStaff Mode: %staff%'
        - '&eVanished: %vanish%'
        - ''
        - '&3Click to teleport to &b%player%&e.'
  
  DENY_BREAK: '&cYou cannot break blocks while in staffmode.'
  DENY_PLACE: '&cYou cannot place blocks while in staffmode.'
  DENY_DROP: '&cYou cannot drop items while in staffmode.'
  COMBAT_TP_EMPTY: '&cCould not find players in combat.'
  NOT_ALLOWED_COMMAND: '&cYou are not allowed to use this command while frozen.'
  HIT_DENIED: '&cYou cannot damage other players while frozen!'
  HIT_FROZEN: '&eYou cannot hit &c%player% &eas they are currently frozen!'
  ENABLED_STAFF: '&dMod Mode: &aEnabled'
  DISABLED_STAFF: '&dMod Mode: &cDisabled'
  ENABLED_STAFF_TARGET: '&dMod Mode: &aEnabled &7(%player%)'
  DISABLED_STAFF_TARGET: '&dMod Mode: &cDisabled &7(%player%)'
  ENABLED_VANISH: '&dVanish: &aEnabled'
  DISABLED_VANISH: '&dVanish: &cDisabled'
  ENABLED_VANISH_TARGET: '&dVanish: &aEnabled &7(%player%)'
  DISABLED_VANISH_TARGET: '&dVanish: &cDisabled &7(%player%)'
  VANISH_INTERVAL_MESSAGE:
    - '&7&m---------------------------'
    - '&d&lYou are currently frozen!'
    - '&eJoin the teamspeak: &dts.azurite.cc'
    - '&7&m---------------------------'
HIDE_STAFF_COMMAND:
  ENABLED: '&dHide Staff: &aEnabled'
  DISABLED: '&dHide Staff: &cDisabled'
INVSEE_COMMAND:
  USAGE: '&cUsage: /invsee <player>'